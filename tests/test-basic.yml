name: Test basic deployment
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create static directory
        run: |
          mkdir -p /tmp/static-site
          echo "<html><body>Hello</body></html>" > /tmp/static-site/index.html
      - id: action
        uses: .
        continue-on-error: true
        with:
          cloudflare-api-token: fake-api-token
          cloudflare-account-id: fake-account-id
          cloudflare-project-name: fake-project
          directory: /tmp/static-site
          github-token: fake-github-token
          github-environment: production
      - name: Assert action ran (expected to fail with fake credentials)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "success" ]; then
            echo "PASS: action succeeded"
          elif [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "PASS: action failed as expected with fake credentials"
          else
            echo "FAIL: unexpected outcome: ${{ steps.action.outcome }}"
            exit 1
          fi
          echo "PASS"
