name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create static directory
        run: |
          mkdir -p /tmp/static-files
          echo "<html><body>Hello World</body></html>" > /tmp/static-files/index.html

      - id: action
        uses: .
        continue-on-error: true
        with:
          cloudflare-api-token: fake-api-token-for-testing
          cloudflare-account-id: fake-account-id-for-testing
          cloudflare-project-name: fake-project-name
          directory: /tmp/static-files
          github-token: fake-github-token
          github-environment: production

      - name: Assert action ran (may fail due to invalid credentials)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with invalid credentials
          # We just verify it ran and attempted the deployment
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome: ${{ steps.action.outcome }})"
