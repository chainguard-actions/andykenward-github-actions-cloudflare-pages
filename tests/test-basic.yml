name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create static directory
        run: mkdir -p /tmp/static && echo "<html>hello</html>" > /tmp/static/index.html
      - id: action
        uses: .
        continue-on-error: true
        with:
          cloudflare-api-token: fake-api-token
          cloudflare-account-id: fake-account-id
          cloudflare-project-name: fake-project
          directory: /tmp/static
          github-token: fake-github-token
          github-environment: production
      - name: Assert action ran (may fail due to invalid credentials)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action was invoked with all required inputs"
