name: Test optional inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/pull/42/merge
      GITHUB_EVENT_NAME: pull_request
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create static directory and working directory
        run: |
          mkdir -p /tmp/static-files-pr
          echo "<html><body>PR Preview</body></html>" > /tmp/static-files-pr/index.html
          mkdir -p /tmp/working-dir

      - id: action
        uses: .
        continue-on-error: true
        with:
          cloudflare-api-token: fake-api-token-for-testing
          cloudflare-account-id: fake-account-id-for-testing
          cloudflare-project-name: fake-project-name
          directory: /tmp/static-files-pr
          github-token: fake-github-token
          github-environment: preview
          pr-number: "42"
          working-directory: /tmp/working-dir
          wrangler-version: "3.0.0"

      - name: Assert action ran with optional inputs (may fail due to invalid credentials)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with invalid credentials
          # We just verify it ran and attempted the deployment
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with optional inputs (outcome: ${{ steps.action.outcome }})"
